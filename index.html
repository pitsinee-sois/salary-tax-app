<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary & Tax System - Customized Themes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');

        :root {
            --bg-main: #fdf2f8; --color-primary: #f472b6; --text-main: #831843;
        }

        /* --- 🎨 Theme Definitions --- */
        [data-theme="sakura"] { --bg-main: #fff5f7; --color-primary: #f472b6; }
        [data-theme="orange"] { --bg-main: #fff7ed; --color-primary: #fb923c; }
        [data-theme="fuji"] { --bg-main: #e0f2fe; --color-primary: #38bdf8; }
        [data-theme="bamboo"] { --bg-main: #f7fee7; --color-primary: #84cc16; }
        [data-theme="matcha"] { --bg-main: #f0fdf4; --color-primary: #34d399; }
        [data-theme="ocean"] { --bg-main: #0c4a6e; --color-primary: #2dd4bf; }
        [data-theme="purple"] { --bg-main: #faf5ff; --color-primary: #c084fc; }
        [data-theme="pastel"] { --bg-main: linear-gradient(135deg, #fbcfe8, #bfdbfe); --color-primary: #a78bfa; }
        [data-theme="dark"] { --bg-main: #0f172a; --color-primary: #93c5fd; }

        body { font-family: 'Sarabun', sans-serif; background: var(--bg-main); margin: 0; min-height: 100vh; transition: background 0.5s; overflow-x: hidden; }

        /* --- 🌳 Scenery & Animation Layers --- */
        #themeEffectLayer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; }
        
        @keyframes fall { 0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translate(-10vw, 110vh) rotate(360deg); opacity: 0; } }
        @keyframes drift { 0% { transform: translateX(-10vw); } 100% { transform: translateX(110vw); } }
        @keyframes bubbleRise { 0% { transform: translateY(110vh); opacity: 0; } 50% { opacity: 0.7; } 100% { transform: translateY(-10vh); opacity: 0; } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes shootingStar { 0% { transform: translate(100vw, -10vh) rotate(-45deg); width: 0; } 100% { transform: translate(-20vw, 110vh) rotate(-45deg); width: 200px; opacity: 0; } }

        .scenery-element { position: absolute; background-size: contain; background-repeat: no-repeat; }
        .particle { position: absolute; }

        /* 🌸 Sakura & Maple Trees */
        .tree-side { width: 400px; height: 100vh; bottom: 0; }
        .tree-left { left: -50px; transform: scaleX(1); }
        .tree-right { right: -50px; transform: scaleX(-1); }

        /* 🗻 Fuji */
        .fuji-mt { bottom: 0; left: 50%; transform: translateX(-50%); width: 100vw; height: 60vh; background-position: bottom center; }

        /* 📱 UI Box (Centered) */
        .container { position: relative; z-index: 10; max-width: 600px; margin: 100px auto; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        select { padding: 10px 20px; border-radius: 15px; border: 2px solid var(--color-primary); font-size: 1rem; }
    </style>
</head>
<body data-theme="sakura">

    <div id="themeEffectLayer"></div>

    <div class="container">
        <h2>✨ เลือกธีมที่คุณต้องการ ✨</h2>
        <select id="themeSelect" onchange="applyTheme()">
            <option value="sakura">🌸 Sakura</option>
            <option value="orange">🍁 Maple</option>
            <option value="fuji">🗻 Fuji View</option>
            <option value="bamboo">🎋 Bamboo Forest</option>
            <option value="skyblue">☁️ Sky (Default)</option>
            <option value="matcha">🍵 Matcha Tea</option>
            <option value="ocean">🌊 Under the Ocean</option>
            <option value="purple">🪻 Lavender</option>
            <option value="pastel">🌈 Pastel Bubbles</option>
            <option value="dark">🌙 Starry Shooting Star</option>
        </select>
        <p>ลองเปลี่ยนธีมเพื่อดูเอฟเฟกต์สุดพิเศษ!</p>
    </div>

    <script>
        const svgAssets = {
            sakuraTree: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 800'%3E%3Cpath d='M50,800 Q100,400 50,0' stroke='%234a2e1b' stroke-width='40' fill='none'/%3E%3Cpath d='M60,500 Q200,450 350,300' stroke='%234a2e1b' stroke-width='20' fill='none'/%3E%3Ccircle cx='300' cy='300' r='80' fill='%23fbcfe8' opacity='0.8'/%3E%3Ccircle cx='350' cy='250' r='60' fill='%23f9a8d4' opacity='0.8'/%3E%3C/svg%3E",
            mapleTree: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 800'%3E%3Cpath d='M50,800 Q100,400 50,0' stroke='%233e2723' stroke-width='40' fill='none'/%3E%3Cpath d='M60,500 Q200,450 350,300' stroke='%233e2723' stroke-width='20' fill='none'/%3E%3Ccircle cx='300' cy='300' r='80' fill='%23ea580c' opacity='0.8'/%3E%3Ccircle cx='350' cy='250' r='60' fill='%23f97316' opacity='0.8'/%3E%3C/svg%3E",
            fuji: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Cpath d='M400,50 L750,400 L50,400 Z' fill='%2338bdf8'/%3E%3Cpath d='M400,50 L480,150 Q400,180 320,150 Z' fill='white'/%3E%3C/svg%3E",
            bamboo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 800'%3E%3Crect x='40' y='0' width='20' height='800' fill='%2365a30d' rx='10'/%3E%3Cpath d='M50,100 L90,80 M50,300 L10,280' stroke='%234d7c0f' stroke-width='5'/%3E%3C/svg%3E"
        };

        function applyTheme() {
            const theme = document.getElementById('themeSelect').value;
            document.body.setAttribute('data-theme', theme);
            const layer = document.getElementById('themeEffectLayer');
            layer.innerHTML = '';

            // 1 & 2: Sakura & Maple
            if (theme === 'sakura' || theme === 'orange') {
                const img = theme === 'sakura' ? svgAssets.sakuraTree : svgAssets.mapleTree;
                layer.innerHTML += `<div class="scenery-element tree-side tree-left" style="background-image:url('${img}')"></div>`;
                layer.innerHTML += `<div class="scenery-element tree-side tree-right" style="background-image:url('${img}')"></div>`;
                createParticles(theme === 'sakura' ? '🌸' : '🍁', 30, 'fall');
            }

            // 3: Fuji (Expanded)
            if (theme === 'fuji') {
                layer.innerHTML += `<div class="scenery-element fuji-mt" style="background-image:url('${svgAssets.fuji}')"></div>`;
                createParticles('☁️', 10, 'drift', 40); // เพิ่มเมฆ
                createParticles('🦅', 3, 'drift', 15); // เพิ่มนก
                layer.innerHTML += `<div class="scenery-element" style="top:0; right:0; width:300px; height:300px; background-image:url('${svgAssets.sakuraTree}'); transform:rotate(150deg)"></div>`;
            }

            // 4: Bamboo (Thicker)
            if (theme === 'bamboo') {
                for(let i=0; i<6; i++) {
                    layer.innerHTML += `<div class="scenery-element" style="bottom:0; left:${i*5}vw; width:80px; height:100vh; background-image:url('${svgAssets.bamboo}')"></div>`;
                    layer.innerHTML += `<div class="scenery-element" style="bottom:0; right:${i*5}vw; width:80px; height:100vh; background-image:url('${svgAssets.bamboo}')"></div>`;
                }
                layer.innerHTML += `<div class="scenery-element" style="bottom:20px; left:20vw; font-size:80px;">🐼</div>`;
            }

            // 6: Matcha
            if (theme === 'matcha') {
                layer.innerHTML += `<div class="scenery-element" style="bottom:50px; left:50%; transform:translateX(-50%); font-size:150px;">🍵</div>`;
                createParticles('🍃', 20, 'fall');
            }

            // 7: Ocean
            if (theme === 'ocean') {
                layer.innerHTML += `<div class="scenery-element" style="bottom:0; left:0; font-size:100px;">🪸</div>`;
                layer.innerHTML += `<div class="scenery-element" style="bottom:0; right:0; font-size:100px;">🪸</div>`;
                createParticles('🫧', 40, 'bubbleRise');
                createParticles('🐠', 10, 'drift');
                createParticles('🦈', 1, 'drift', 15);
            }

            // 9: Lavender
            if (theme === 'purple') {
                createParticles('🪻', 15, 'bubbleRise', 40); // Lavender Swaying
                createParticles('✨', 20, 'twinkle');
            }

            // 10: Pastel
            if (theme === 'pastel') {
                createParticles('🫧', 25, 'bubbleRise');
            }

            // 12: Starry Night (Shooting stars)
            if (theme === 'dark') {
                createParticles('⭐', 50, 'twinkle');
                setInterval(() => {
                    const star = document.createElement('div');
                    star.className = 'particle';
                    star.style.cssText = `top:${Math.random()*40}vh; left:100vw; animation: shootingStar 1s linear forwards; height:2px; background:white;`;
                    layer.appendChild(star);
                    setTimeout(() => star.remove(), 1000);
                }, 2000);
            }
        }

        function createParticles(char, count, anim, size = 20) {
            const layer = document.getElementById('themeEffectLayer');
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = `particle ${anim}`;
                p.innerText = char;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.fontSize = (Math.random() * size + 10) + 'px';
                p.style.animation = `${anim} ${Math.random() * 5 + 3}s infinite linear`;
                p.style.animationDelay = `-${Math.random() * 5}s`;
                if(anim === 'twinkle') p.style.animation = `twinkle ${Math.random()*2+1}s infinite`;
                layer.appendChild(p);
            }
        }

        applyTheme(); // Init
    </script>
</body>
</html>
